# Zeabur 部署配置文件
# 文档: https://zeabur.com/docs/deploy/config

[project]
name = "zhichong-yuntu"

# ==================== 后端服务 ====================
[[services]]
name = "backend"
path = "./"

# 构建命令
buildCommand = "git lfs install && git lfs pull && pip install -r backend/requirements.txt"

# 启动命令 - Zeabur 默认使用 uvicorn main:app
# 根目录 main.py 会导入 backend.app.main:app
startCommand = "uvicorn main:app --host 0.0.0.0 --port 8080"

# 端口
port = 8080

# 健康检查路径
healthcheck = "/api/health"

# 环境变量
[services.backend.env]
PORT = "8080"

# ==================== 前端服务 ====================
[[services]]
name = "frontend"
path = "./frontend"

# 构建命令
buildCommand = "npm ci --legacy-peer-deps && CI=false GENERATE_SOURCEMAP=false NODE_OPTIONS=--max_old_space_size=512 npm run build"

# 启动命令 - 使用 serve 静态文件服务
startCommand = "npx serve -s build -l 3000"

# 端口
port = 3000

# 环境变量
[services.frontend.env]
REACT_APP_API_BASE_URL = "https://zhichongyuntu.zeabur.app/api"

# 服务依赖 - 前端依赖后端
[services.frontend.deps]
service = "backend"
